name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Checkout GitHub Pages repository
        uses: actions/checkout@v4
        with:
          repository: sinjar666/sinjar666.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: gh-pages-repo
      - name: Copy dist contents to GitHub Pages repo
        run: |
          shopt -s extglob
          rm -rf gh-pages-repo/!(CNAME)
          cp -r dist/* gh-pages-repo/
          cp dist/.nojekyll gh-pages-repo/ 2>/dev/null || true

      - name: Commit and push to GitHub Pages repository
        working-directory: gh-pages-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from my-portfolio: ${{ github.sha }}" || true
          git push origin main
